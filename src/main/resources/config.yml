# Elevator Plugin Configuration
# Created by: comonier | Version: 1.0

# Plugin language (messages_en or messages_pt)
lang: "messages_en"

# Blocks that will function as an elevator
# You can add as many materials as you want from the official Bukkit list
block-types:
  - IRON_BLOCK
  - GOLD_BLOCK

# If set to false, everyone can use the elevator.
# If set to true, only those with 'elevator.use' permission can use it.
require-permission: false

# Maximum distance between blocks for teleportation.
# Use -1 for unlimited distance (within world boundaries).
max-distance: -1

# Discord Webhook URL for creation announcements
discord-webhook: ""

# Sound Settings
# Volume 2.0 allows the sound to be heard within ~32 blocks (2 chunks)
# Pitch: 0.5 to 2.0 (Higher is sharper)

# Sound when going UP
sound-up-type: "ENTITY_SHULKER_TELEPORT"
sound-up-pitch: 1.2

# Sound when going DOWN
sound-down-type: "BLOCK_PISTON_EXTEND"
sound-down-pitch: 0.8

# Global volume for both
sound-volume: 2.0

# --- Height Reference per Dimension ---
# Overworld: Min Y -64 | Max Y 320 (Total: 384 blocks)
# Nether:    Min Y 0   | Max Y 128 (Total: 128 blocks)
# The End:   Min Y 0   | Max Y 256 (Total: 256 blocks)
# ------------------------------------------
