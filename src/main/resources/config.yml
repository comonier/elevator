# Elevator Plugin Configuration
# Created by: comonier | Version: 1.0

# Plugin language (messages_en or messages_pt)
lang: "messages_en"

# Blocks that will function as an elevator
block-types:
  - IRON_BLOCK
  - GOLD_BLOCK

# Set to true to require 'elevator.use' permission
require-permission: false

# Max teleport distance (-1 = unlimited)
max-distance: -1

# Discord Webhook for global announcements
discord-webhook: ""

# Time in seconds between "Elevator Detected" messages for the same player
detect-cooldown: 5

# Sound Settings
# Volume 2.0 allows the sound to be heard within ~32 blocks (2 chunks)

# Sound when stepping ON an elevator block
sound-detect-type: "BLOCK_BEEHIVE_ENTER"
sound-detect-pitch: 1.0

# Sound when going UP
sound-up-type: "ENTITY_SHULKER_TELEPORT"
sound-up-pitch: 1.2

# Sound when going DOWN
sound-down-type: "BLOCK_PISTON_EXTEND"
sound-down-pitch: 0.8

# Global volume for teleport sounds
sound-volume: 2.0

# --- Height Reference per Dimension ---
# Overworld: Min Y -64 | Max Y 320
# Nether:    Min Y 0   | Max Y 128
# The End:   Min Y 0   | Max Y 256
# ------------------------------------------
